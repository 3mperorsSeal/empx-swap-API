      summary: Docs redirect
      description: Redirects to the interactive Swagger UI at `/api-docs`.
      responses:
        "302":
          description: Redirect to /api-docs
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GenerateKeyRequest:
      type: object
      properties:
        userId:
          anyOf:
            - type: number
            - type: "null"
        tier:
          type: string
        persist:
          type: boolean
      additionalProperties: false
      example:
        userId: 123
        tier: "test"
        persist: true
    RevokeKeyRequest:
      type: object
      properties:
        prefix:
          type: string
      required: ["prefix"]
      additionalProperties: false
      example:
        prefix: "test_"
    QuoteItem:
      type: object
      properties:
        sellToken:
          type: string
        buyToken:
          type: string
        sellAmount:
          type: string
      required: ["sellToken", "buyToken", "sellAmount"]
      additionalProperties: false
      example:
        sellToken: "ETH"
        buyToken: "USDC"
        sellAmount: "1000000000000000000"
    QuoteBatchRequest:
      type: object
      properties:
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"
      required: ["quotes"]
      additionalProperties: false
      example:
        quotes:
          - sellToken: "ETH"
            buyToken: "USDC"
            sellAmount: "1000000000000000000"
          - sellToken: "DAI"
            buyToken: "USDC"
            sellAmount: "1000000"
    SwapBuildRequest:
      type: object
      properties:
        sellToken:
          type: string
        buyToken:
          type: string
        sellAmount:
          type: string
        recipient:
          type: string
      required: ["sellToken", "buyToken", "sellAmount"]
      additionalProperties: false
      example:
        sellToken: "ETH"
        buyToken: "DAI"
        sellAmount: "500000000000000000"
        recipient: "0x0123456789abcdef0123456789abcdef01234567"
