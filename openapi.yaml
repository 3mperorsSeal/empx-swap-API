  /metrics:
    get:
      tags:
        - System
      summary: Prometheus metrics
      description: Exposes Prometheus metrics for monitoring.
      responses:
        "200":
          description: Prometheus metrics text/plain
          content:
            text/plain:
              schema:
                type: string
  /api/test:
    get:
      tags:
        - System
      summary: API key test endpoint
      description: Returns a simple success message when a valid API key is provided.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /openapi.json:
    get:
      tags:
        - System
      summary: Raw OpenAPI JSON
      description: Returns the raw OpenAPI specification in JSON format.
      responses:
        "200":
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
  /openapi.yaml:
    get:
      tags:
        - System
      summary: Raw OpenAPI YAML
      description: Returns the raw OpenAPI specification in YAML format.
      responses:
        "200":
          description: OpenAPI YAML
          content:
            text/yaml:
              schema:
                type: string
  /api-docs:
    get:
      tags:
        - System
      summary: Swagger UI
      description: Interactive API documentation (Swagger UI).
      responses:
        "200":
          description: HTML Swagger UI
          content:
            text/html:
              schema:
                type: string
  /docs:
    get:
      tags:
        - System
      summary: Docs redirect
      description: Redirects to the interactive Swagger UI at `/api-docs`.
      responses:
        "302":
          description: Redirect to /api-docs
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: API key passed in the `X-API-KEY` request header. Generate keys via `/v1/auth/generate` or the dashboard.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JSON Web Token obtained from `/v1/auth/user/login`.

  parameters:
    ChainIdParam:
      name: chainId
      in: path
      required: true
      description: Numeric chain identifier (e.g. `1` for Ethereum mainnet, `56` for BSC).
      schema:
        type: string
        pattern: '^\d+$'
        example: "1"
    PaginationLimit:
      name: limit
      in: query
      description: Maximum number of items to return (default 50, max 500).
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    PaginationOffset:
      name: offset
      in: query
      description: Number of items to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window.
      schema:
        type: integer
        example: 1000
    X-RateLimit-Remaining:
      description: Requests remaining in the current window.
      schema:
        type: integer
        example: 950
    X-RateLimit-Reset:
      description: UTC epoch seconds when the rate-limit window resets.
      schema:
        type: integer
        example: 1709330400
    X-Request-Id:
      description: Unique identifier for the request (pass this when contacting support).
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  responses:
    BadRequest:
      description: |
        **400 Bad Request** — The request body, query parameters or path parameters failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            error: "validation_error"
            message: "sellAmount must be a numeric string"
            details:
              field: "sellAmount"
              issue: "invalid_format"
    Unauthorized:
      description: |
        **401 Unauthorized** — Missing or invalid API key / JWT token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            error: "unauthorized"
            message: "Invalid or missing API key"
    Forbidden:
      description: |
        **403 Forbidden** — The authenticated key does not have permission for this resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            error: "forbidden"
            message: "Insufficient permissions"
    NotFound:
      description: |
        **404 Not Found** — The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            error: "not_found"
            message: "Resource not found"
    RateLimited:
      description: |
        **429 Too Many Requests** — Rate limit exceeded. Check `X-RateLimit-*` response headers.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            error: "rate_limited"
            message: "Too many requests, please try again later"
    InternalError:
      description: |
        **500 Internal Server Error** — An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            requestId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            error: "internal_server_error"
            message: "An unexpected error occurred"

  schemas:
    ErrorResponse:
      type: object
      description: Standardized error envelope returned by all endpoints.
      properties:
        requestId:
          type: string
          format: uuid
          description: Unique request identifier for tracing and support.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        error:
          type: string
          description: Machine-readable error code (e.g. `validation_error`, `unauthorized`).
          example: "validation_error"
        message:
          type: string
          description: Human-readable error description (only in development mode for 500s).
          example: "sellAmount must be a numeric string"
        details:
          type: object
          description: Additional structured details about the error.
          additionalProperties: true
      required: [error]

    GenerateKeyRequest:
      type: object
      description: Request body to generate a new API key.
      properties:
        userId:
          anyOf:
            - type: number
            - type: "null"
          description: Optional user ID to bind the key to.
          example: 123
        tier:
          type: string
          description: Pricing tier for the key.
          enum: [free, developer, pro, enterprise, test]
          example: "test"
        persist:
          type: boolean
          description: When `true`, the key is stored in the database. When `false`, the key is ephemeral.
          default: false
          example: true
      additionalProperties: false
      example:
        userId: 123
        tier: "test"
        persist: true

    RevokeKeyRequest:
      type: object
      description: Request body to revoke API key(s) matching a prefix.
      properties:
        prefix:
          type: string
          description: The 8-character key prefix identifying the key to revoke.
          minLength: 1
          example: "bdb24981"
      required: ["prefix"]
      additionalProperties: false
      example:
        prefix: "bdb24981"

    QuoteItem:
      type: object
      description: A single quote request specifying the swap pair and amount.
      properties:
        sellToken:
          type: string
          description: Address or symbol of the token to sell.
          example: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
        buyToken:
          type: string
          description: Address or symbol of the token to buy.
          example: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
        sellAmount:
          type: string
          description: Amount of sell token in its smallest unit (wei for ETH).
          pattern: '^\d+$'
          example: "1000000000000000000"
      required: ["sellToken", "buyToken", "sellAmount"]
      additionalProperties: false

    QuoteBatchRequest:
      type: object
      description: Batch of quote requests to process in a single API call.
      properties:
        quotes:
          type: array
          description: Array of individual quote requests (1–50 items).
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/QuoteItem"
      required: ["quotes"]
      additionalProperties: false
      example:
        quotes:
          - sellToken: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
            buyToken: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
            sellAmount: "1000000000000000000"
          - sellToken: "0x6B175474E89094C44Da98b954EedeAC495271d0F"
            buyToken: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
            sellAmount: "1000000000000000000000"

    SwapBuildRequest:
      type: object
      description: Request body for building an unsigned swap transaction.
      properties:
        sellToken:
          type: string
          description: Address or symbol of the token being sold.
          example: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
        buyToken:
          type: string
          description: Address or symbol of the token being purchased.
          example: "0x6B175474E89094C44Da98b954EedeAC495271d0F"
        sellAmount:
          type: string
          description: Amount of sell token in its smallest unit.
          pattern: '^\d+$'
          example: "500000000000000000"
        recipient:
          type: string
          description: |
            Wallet address that will receive the bought tokens.
            Must be a valid EVM address (`0x` + 40 hex chars).
          pattern: "^0x[a-fA-F0-9]{40}$"
          example: "0x0123456789abcdef0123456789abcdef01234567"
        slippage:
          type: number
          description: Maximum acceptable slippage in basis points (0–10000, i.e. 0%–100%).
          minimum: 0
          maximum: 10000
          example: 50
        fee:
          type: number
          description: Fee in basis points charged on top of the swap (0–10000).
          minimum: 0
          maximum: 10000
          example: 30
        deadline:
          type: number
          description: Unix timestamp after which the transaction is no longer valid.
          example: 1709330400
      required: ["sellToken", "buyToken", "sellAmount"]
      additionalProperties: false
      example:
        sellToken: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
        buyToken: "0x6B175474E89094C44Da98b954EedeAC495271d0F"
        sellAmount: "500000000000000000"
        recipient: "0x0123456789abcdef0123456789abcdef01234567"
        slippage: 50
