  /v1/chains:
    $ref: "./openapi/chains.yaml#/paths/~1v1~1chains"
  /v1/chains/{chainId}/tokens:
    $ref: "./openapi/chains.yaml#/paths/~1v1~1chains~1{chainId}~1tokens"
  /v1/chains/{chainId}/adapters:
    $ref: "./openapi/chains.yaml#/paths/~1v1~1chains~1{chainId}~1adapters"
  /v1/quotes/{chainId}/fast:
    $ref: "./openapi/quotes.yaml#/paths/~1v1~1quotes~1{chainId}~1fast"
  /v1/quotes/{chainId}/best:
    $ref: "./openapi/quotes.yaml#/paths/~1v1~1quotes~1{chainId}~1best"
  /v1/quotes/{chainId}/batch:
    $ref: "./openapi/quotes.yaml#/paths/~1v1~1quotes~1{chainId}~1batch"
  /v1/swap/{chainId}/build:
