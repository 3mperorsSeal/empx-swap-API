  /v1/auth/user/login:
    $ref: "./openapi/user.yaml#/paths/~1v1~1auth~1user~1login"
  /v1/auth/user/me:
    $ref: "./openapi/user.yaml#/paths/~1v1~1auth~1user~1me"
  /v1/keys:
