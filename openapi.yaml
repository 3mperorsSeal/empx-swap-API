openapi: 3.0.0
info:
  title: DEX Aggregator API
  description: |

    A fast, multi-chain DEX aggregation service that finds and builds swap
    routes across leading liquidity sources. Use this API to get price
    quotations, compare routing strategies, and build transactions ready to
    sign and broadcast.

    ## Authentication

    - Include your API key in the `X-API-KEY` header for most production
      endpoints.
    - Example: `X-API-KEY: sk_live_your_key_here`

    Get or manage API keys in the dashboard: https://yourdex.com/dashboard

    ## Rate limits

    - Free: 100 requests / minute
    - Developer: 1,000 requests / minute
    - Pro: 10,000 requests / minute
    - Enterprise: contact sales for custom limits

    ## Routing strategies

    Choose the tradeoff between speed and price:

    - `fast` (noSplit) — Single-path route focused on lowest latency.
    - `split` — Split trade across multiple pools/protocols to improve price.
    - `converge` — Two-stage routing for very large trades to reduce impact.
    - `auto` — Let the system choose the best strategy for the request.

    ## Quick links

    - Swagger UI (interactive docs): `/api-docs`
    - Raw spec (YAML): `/openapi.yaml`
    - Raw spec (JSON): `/openapi.json`

    ## Tips

    - Use `timeout` on the `/quote/best` endpoint when querying many
      strategies to bound compute time.
    - Include a `recipient` for swap builds to construct final calldata.
