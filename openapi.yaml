openapi: 3.0.3
info:
  title: EMPX Swap API
  description: |
    **A fast, multi-chain DEX aggregation service** that finds and builds optimal
    swap routes across leading liquidity sources (Uniswap, SushiSwap, Curve, 1inch, etc.).

    Use this API to:
    - **Discover** supported chains, tokens and DEX adapters.
    - **Get quotes** — single fast quotes, strategy-optimized best quotes, or batch quotes.
    - **Build transactions** — receive unsigned swap calldata ready to sign and broadcast.
    - **Manage API keys** — create, rotate, revoke and whitelist your keys.

    ---

    ## Authentication

    Most endpoints require an API key passed via the `X-API-KEY` header:

    ```
    X-API-KEY: sk_live_your_key_here
    ```

    Dashboard and user-management endpoints use `Authorization: Bearer <JWT>`.

    ## Rate Limits

    | Tier         | Requests / min | Burst |
    |--------------|---------------:|------:|
    | Free         |            100 |   20  |
    | Developer    |          1,000 |  100  |
    | Pro          |         10,000 |  500  |
    | Enterprise   |  custom (contact sales) | — |

    Rate-limit headers are returned on **every** response:
    - `X-RateLimit-Limit` – max requests allowed in the window
    - `X-RateLimit-Remaining` – requests remaining
    - `X-RateLimit-Reset` – UTC epoch seconds when the window resets

    ## Routing Strategies

    | Strategy    | Behaviour |
    |-------------|-----------|
    | `fast`      | Single-path, lowest latency |
    | `split`     | Split across pools for better price |
    | `converge`  | Two-stage routing for very large trades |
    | `auto`      | System picks the optimal strategy |

    ## Error Envelope

    All errors follow a consistent JSON envelope:

    ```json
    {
      "requestId": "abc-123",
      "error": "error_code",
      "message": "Human-readable description",
      "details": {}
    }
    ```

    ## Quick Links

    | Resource | URL |
    |----------|-----|
    | Swagger UI | [`/api-docs`](/api-docs) |
    | OpenAPI JSON | [`/openapi.json`](/openapi.json) |
    | OpenAPI YAML | [`/openapi.yaml`](/openapi.yaml) |
    | Support | <support@yourdex.com> |

  version: "1.0.0"
  contact:
    name: EMPX API Support
    email: support@yourdex.com
    url: https://yourdex.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://yourdex.com/terms

  x-logo:
    url: https://yourdex.com/logo.png
    altText: EMPX Swap

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.yourdex.com/v1
    description: Production
  - url: https://api-staging.yourdex.com/v1
    description: Staging

tags:
  - name: Chains
    description: |
      Discover the blockchain networks, tokens and DEX adapters supported by the aggregator.
  - name: Quotes
    description: |
      Obtain price quotes for token swaps — fast single estimates, optimized best-price quotes,
      or batch multiple requests in one call.
  - name: Swap
    description: |
      Build unsigned swap transactions ready for signing and on-chain submission.
  - name: Auth
    description: |
      Generate, revoke and inspect API keys. Keys are required for all protected endpoints.
  - name: Users
    description: |
      User registration, login (JWT), and profile endpoints.
  - name: Dashboard
    description: |
      Dashboard endpoints for managing API keys (CRUD), whitelist configuration
      and per-key usage analytics.
  - name: Partners
    description: |
      Manage partner organisations for revenue sharing and branding.
  - name: Billing
    description: |
      Purchase additional credits and query remaining quota.
  - name: System
    description: |
      Health checks, Prometheus metrics and internal admin utilities.

security:
  - ApiKeyAuth: []
