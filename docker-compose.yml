version: "3.8"
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dexdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dex-aggregator

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dex-aggregator

  # backend:
  #   build: ./backend
  #   restart: unless-stopped
  #   environment:
  #     - PORT=3000
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dexdb
  #     - REDIS_URL=redis://redis:6379
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - postgres
  #     - redis

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - dex-aggregator

volumes:
  pgdata:
    driver: local

networks:
  dex-aggregator:
    driver: bridge
