services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dexdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dex-aggregator

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - dex-aggregator

  # backend:
  #   build: .
  #   restart: unless-stopped
  #   env_file:
  #     - .env                          # picks up all vars from .env automatically
  #   environment:
  #     # Override host-specific values for container networking:
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dexdb
  #     - REDIS_URL=redis://redis:6379
  #     - PORT=3000
  #     # Metrics / performance (sourced from .env via env_file above):
  #     # METRICS_TOKEN and SLOW_REQUEST_MS are forwarded automatically.
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - postgres
  #     - redis

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - dex-aggregator

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle" # allows hot-reload via POST /-/reload
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dex-aggregator
    extra_hosts:
      # Lets Prometheus reach the API running on the host machine (dev mode)
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/api_overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - dex-aggregator

volumes:
  pgdata:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  dex-aggregator:
    driver: bridge
