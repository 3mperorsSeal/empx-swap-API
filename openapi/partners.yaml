paths:
  /v1/partners:
    get:
      tags:
        - Partners
      summary: List all partners
      description: |
        Returns a list of all registered partner organisations.
        Partners are companies integrating the swap API for revenue sharing.
      operationId: listPartners
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successfully retrieved partners.
          headers:
            X-Request-Id:
              $ref: "../openapi.yaml#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the operation succeeded.
                    example: true
                  data:
                    type: array
                    description: Array of partner objects.
                    items:
                      $ref: "#/components/schemas/Partner"
              examples:
                example:
                  summary: Partners list
                  value:
                    success: true
                    data:
                      - id: "1"
                        company_name: "Acme Corp"
                        website: "https://acme.example"
                        wallet_address: "0x0123456789abcdef0123456789abcdef01234567"
                        created_at: "2026-01-01T00:00:00Z"
                        updated_at: "2026-01-01T00:00:00Z"
        "401":
          $ref: "../openapi.yaml#/components/responses/Unauthorized"
        "500":
          $ref: "../openapi.yaml#/components/responses/InternalError"

    post:
      tags:
        - Partners
      summary: Create a new partner
      description: |
        Register a new partner organisation. Requires `company_name` and
        `wallet_address` at minimum.
      operationId: createPartner
      security:
        - BearerAuth: []
      requestBody:
        required: true
        description: Partner details.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "200":
          description: Partner created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Partner"
              examples:
                created:
                  summary: Created partner
                  value:
                    success: true
                    data:
                      id: "2"
                      company_name: "New Co"
                      website: null
                      wallet_address: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
                      created_at: "2026-01-15T00:00:00Z"
                      updated_at: "2026-01-15T00:00:00Z"
        "400":
          $ref: "../openapi.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi.yaml#/components/responses/Unauthorized"
        "500":
          $ref: "../openapi.yaml#/components/responses/InternalError"

  /v1/partners/{id}:
    get:
      tags:
        - Partners
      summary: Get partner by ID
      description: Returns a single partner by its unique identifier.
      operationId: getPartner
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Unique partner identifier.
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Partner found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Partner"
              examples:
                example:
                  summary: Single partner
                  value:
                    success: true
                    data:
                      id: "1"
                      company_name: "Acme Corp"
                      website: "https://acme.example"
                      wallet_address: "0x0123456789abcdef0123456789abcdef01234567"
                      created_at: "2026-01-01T00:00:00Z"
                      updated_at: "2026-01-01T00:00:00Z"
        "401":
          $ref: "../openapi.yaml#/components/responses/Unauthorized"
        "404":
          $ref: "../openapi.yaml#/components/responses/NotFound"
        "500":
          $ref: "../openapi.yaml#/components/responses/InternalError"

    put:
      tags:
        - Partners
      summary: Update partner
      description: Update an existing partner's details by ID.
      operationId: updatePartner
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Unique partner identifier.
          schema:
            type: string
            example: "1"
      requestBody:
        required: true
        description: Updated partner details.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "200":
          description: Partner updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Partner"
        "400":
          $ref: "../openapi.yaml#/components/responses/BadRequest"
        "401":
          $ref: "../openapi.yaml#/components/responses/Unauthorized"
        "404":
          $ref: "../openapi.yaml#/components/responses/NotFound"
        "500":
          $ref: "../openapi.yaml#/components/responses/InternalError"

    delete:
      tags:
        - Partners
      summary: Delete partner
      description: Permanently delete a partner organisation by ID.
      operationId: deletePartner
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Unique partner identifier.
          schema:
            type: string
            example: "1"
      responses:
        "200":
          description: Partner deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
              examples:
                deleted:
                  summary: Deleted
                  value:
                    success: true
        "401":
          $ref: "../openapi.yaml#/components/responses/Unauthorized"
        "404":
          $ref: "../openapi.yaml#/components/responses/NotFound"
        "500":
          $ref: "../openapi.yaml#/components/responses/InternalError"

components:
  schemas:
    Partner:
      type: object
      description: A partner organisation.
      properties:
        id:
          type: string
          description: Unique partner identifier.
          example: "1"
        company_name:
          type: string
          description: Partner company name.
          example: "Acme Corp"
        website:
          anyOf:
            - type: string
              format: uri
            - type: "null"
          description: Partner website URL (optional).
          example: "https://acme.example"
        wallet_address:
          type: string
          description: EVM wallet address for revenue distribution.
          pattern: "^0x[a-fA-F0-9]{40}$"
          example: "0x0123456789abcdef0123456789abcdef01234567"
        created_at:
          type: string
          format: date-time
          description: When the partner was created.
          example: "2026-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
          example: "2026-01-01T00:00:00Z"
      required: [id, company_name, wallet_address]

    PartnerInput:
      type: object
      description: Payload for creating or updating a partner.
      properties:
        company_name:
          type: string
          description: Partner company name.
          minLength: 1
          example: "New Co"
        website:
          anyOf:
            - type: string
              format: uri
            - type: "null"
          description: Partner website URL (optional).
          example: null
        wallet_address:
          type: string
          description: EVM wallet address for revenue distribution.
          pattern: "^0x[a-fA-F0-9]{40}$"
          example: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
      required: [company_name, wallet_address]
      additionalProperties: false
