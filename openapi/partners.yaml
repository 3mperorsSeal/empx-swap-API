paths:
  /v1/partners:
    get:
      tags:
        - Partners
      summary: List partners
      operationId: listPartners
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Partner"
              examples:
                example:
                  summary: Partners list
                  value:
                    success: true
                    data:
                      - id: "1"
                        company_name: "Acme Corp"
                        website: "https://acme.example"
                        wallet_address: "0x0123456789abcdef0123456789abcdef01234567"
                        created_at: "2026-01-01T00:00:00Z"
                        updated_at: "2026-01-01T00:00:00Z"
    post:
      tags:
        - Partners
      summary: Create a new partner
      operationId: createPartner
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "200":
          description: Created partner
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Partner"
              examples:
                created:
                  summary: Created partner example
                  value:
                    success: true
                    data:
                      id: "2"
                      company_name: "New Co"
                      website: null
                      wallet_address: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
                      created_at: "2026-01-15T00:00:00Z"
                      updated_at: "2026-01-15T00:00:00Z"
  /v1/partners/{id}:
    get:
      tags:
        - Partners
      summary: Get partner by id
      operationId: getPartner
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Partner item
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Partner"
              examples:
                example:
                  summary: Single partner
                  value:
                    success: true
                    data:
                      id: "1"
                      company_name: "Acme Corp"
                      website: "https://acme.example"
                      wallet_address: "0x0123456789abcdef0123456789abcdef01234567"
                      created_at: "2026-01-01T00:00:00Z"
                      updated_at: "2026-01-01T00:00:00Z"
    put:
      tags:
        - Partners
      summary: Update partner by id
      operationId: updatePartner
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "200":
          description: Updated partner
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Partner"
    delete:
      tags:
        - Partners
      summary: Delete partner by id
      operationId: deletePartner
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted partner
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
              examples:
                deleted:
                  summary: Deleted response
                  value:
                    success: true
components:
  schemas:
    Partner:
      type: object
      properties:
        id:
          type: string
        company_name:
          type: string
        website:
          anyOf:
            - type: string
            - type: "null"
        wallet_address:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, company_name, wallet_address]
      example:
        id: "1"
        company_name: "Acme Corp"
        website: "https://acme.example"
        wallet_address: "0x0123456789abcdef0123456789abcdef01234567"
        created_at: "2026-01-01T00:00:00Z"
        updated_at: "2026-01-01T00:00:00Z"

    PartnerInput:
      type: object
      properties:
        company_name:
          type: string
        website:
          anyOf:
            - type: string
            - type: "null"
        wallet_address:
          type: string
      required: [company_name, wallet_address]
      additionalProperties: false
      example:
        company_name: "New Co"
        website: null
        wallet_address: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
