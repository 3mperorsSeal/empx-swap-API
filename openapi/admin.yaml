paths:
  /v1/admin/seed:
    post:
      tags:
        - System
      summary: Seed reference data (admin)
      description: |
        **Admin-only.** Idempotent seeding endpoint that populates default tiers,
        API endpoints, tier configurations and chain adapters.

        Requires a JWT with `admin` role in the `Authorization` header.
      operationId: adminSeed
      security:
        - BearerAuth: []
      requestBody:
        required: false
        description: Optional control flags for seeding.
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: When `true`, re-seeds even if data already exists.
                  default: false
                  example: false
              additionalProperties: false
      responses:
        "200":
          description: Seed completed successfully.
          headers:
            X-Request-Id:
              $ref: "../openapi.yaml#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: Whether the seed operation succeeded.
                    example: true
                  tiers:
                    type: integer
                    description: Number of tiers seeded/upserted.
                    example: 4
                  endpoints:
                    type: integer
                    description: Number of endpoints seeded.
                    example: 12
                  adapters:
                    type: integer
                    description: Number of chain adapters seeded.
                    example: 6
              example:
                ok: true
                tiers: 4
                endpoints: 12
                adapters: 6
        "401":
          $ref: "../openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "../openapi.yaml#/components/responses/Forbidden"
        "500":
          $ref: "../openapi.yaml#/components/responses/InternalError"

components: {}
