groups:
  - name: dex-aggregator-alerts
    rules:
      # -----------------------------------------------------------------------
      # High HTTP error rate (> 1% 5xx responses over 5 min)
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate detected"
          description: "More than 1% of requests are returning 5xx status codes."

      # -----------------------------------------------------------------------
      # Slow P99 response time (> 2s for 5 min)
      # -----------------------------------------------------------------------
      - alert: SlowRequests
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency exceeds 2 seconds"
          description: "99th percentile latency is above 2s for more than 5 minutes."

      # -----------------------------------------------------------------------
      # API auth failure spike (potential key scanning)
      # -----------------------------------------------------------------------
      - alert: AuthFailureSpike
        expr: rate(http_requests_total{status="401"}[5m]) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Spike in 401 authentication failures"
          description: "Elevated rate of authentication failures — possible key scanning."

      # -----------------------------------------------------------------------
      # Backend container down
      # -----------------------------------------------------------------------
      - alert: BackendDown
        expr: up{job="dex-aggregator-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is down"
          description: "Prometheus cannot scrape the backend for more than 1 minute."
